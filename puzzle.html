<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="stylesheet" href="css/style.css">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        /* 页面容器 */
        .puzzle-page {
            padding-top: 80px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 页面头部 */
        .puzzle-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 2px solid #c41e3a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .puzzle-header h1 {
            font-size: 1.3em;
            color: #c41e3a;
            margin: 0;
        }

        .puzzle-header p {
            font-size: 0.85em;
            color: #666;
            margin: 0;
        }

        .puzzle-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ctrl-btn {
            background: white;
            border: 1px solid #c41e3a;
            color: #c41e3a;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: #c41e3a; color: white; }

        /* 画布容器 */
        .puzzle-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
            background: white;
        }

        .puzzle-container:active { cursor: grabbing; }

        .puzzle-canvas {
            position: absolute;
            width: 2200px;
            height: 1400px;
            transform-origin: 0 0;
        }

        /* 提示框 */
        .tip-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            border: 1px solid #c41e3a;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 0.82em;
            color: #666;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 图例 */
        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 14px 18px;
            z-index: 100;
            font-size: 0.82em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .legend h4 { margin: 0 0 10px; color: #333; font-size: 0.9em; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

        /* 卡片弹出层 */
        .card-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #c41e3a;
            border-radius: 12px;
            padding: 28px 32px;
            max-width: 480px;
            width: 90%;
            z-index: 2000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .card-popup.active { display: block; }

        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1999;
        }
        .popup-overlay.active { display: block; }

        .popup-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.4em;
            cursor: pointer;
        }
        .popup-close:hover { color: #c41e3a; }

        .popup-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.78em;
            margin-bottom: 10px;
        }

        .popup-title { font-size: 1.5em; color: #333; margin: 0 0 6px; }
        .popup-meta { color: #888; font-size: 0.85em; margin-bottom: 16px; }
        .popup-desc { color: #555; line-height: 1.8; margin-bottom: 20px; font-size: 0.95em; }
        .popup-position { background: #f8f8f8; border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; font-size: 0.88em; }
        .popup-position h4 { color: #666; margin: 0 0 8px; font-size: 0.9em; }
        .popup-position p { color: #333; margin: 0; line-height: 1.7; }
        .popup-link {
            display: inline-block;
            background: #c41e3a;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .popup-link:hover { background: #8b0000; }

        /* SVG节点样式 */
        .node-group { cursor: pointer; }
        .node-group .node-circle {
            transition: filter 0.18s, r 0.18s;
        }
        .node-group:hover .node-circle {
            filter: brightness(1.18) drop-shadow(0 0 8px currentColor);
        }
        .node-group .node-ring {
            transition: opacity 0.2s;
            opacity: 0.45;
        }
        .node-group:hover .node-ring {
            opacity: 0.85;
        }

        .node-label {
            font-size: 13px;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 500;
        }

        .node-label-sub {
            font-size: 10px;
            fill: rgba(255,255,255,0.78);
            text-anchor: middle;
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .category-label {
            font-size: 13px;
            fill: #888;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .connector {
            stroke: #ccc;
            stroke-width: 1.5;
            fill: none;
        }

        .connector-strong {
            stroke: #aaa;
            stroke-width: 2;
            fill: none;
        }

        .star-badge {
            font-size: 10px;
            fill: rgba(255,220,80,0.9);
            text-anchor: middle;
            pointer-events: none;
        }
    </style>

        function showCard(id) {
            const a = articles[id];
            if (!a) return;
            document.getElementById('popupTitle').textContent = a.title;
            document.getElementById('popupMeta').textContent = a.meta;
            document.getElementById('popupDesc').textContent = a.desc;
            document.getElementById('popupPosition').textContent = a.position;
            const badge = document.getElementById('popupBadge');
            badge.textContent = a.badge + ' ' + (a.stars || '');
            badge.style.background = a.badgeColor + '22';
            badge.style.color = a.badgeColor;
            badge.style.border = '1px solid ' + a.badgeColor;
            const popupLink = document.getElementById('popupLink');
            const isWip = a.link && a.link.includes('javascript:alert');
            if (isWip) {
                popupLink.href = '#';
                popupLink.onclick = function(e) { e.preventDefault(); alert('🚧 正在施工，敬请期待！'); return false; };
                popupLink.textContent = '🚧 正在施工';
                popupLink.style.background = '#888';
                popupLink.style.cursor = 'default';
            } else {
                popupLink.href = a.link;
                popupLink.onclick = null;
                popupLink.textContent = '→ 进入精读';
                popupLink.style.background = '#c41e3a';
                popupLink.style.cursor = 'pointer';
            }
            document.getElementById('cardPopup').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeCard() {
            document.getElementById('cardPopup').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // 拖拽和缩放
        const container = document.getElementById('puzzleContainer');
        const canvas = document.getElementById('puzzleCanvas');
        let scale = 0.45;
        let translateX = 0, translateY = 20;
        let isDragging = false;
        let startX, startY, startTX, startTY;

        function applyTransform() {
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        applyTransform();

        container.addEventListener('mousedown', e => {
            if (e.target.closest('.node-group')) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startTX = translateX;
            startTY = translateY;
            e.preventDefault();
        });

        document.addEventListener('mousemove', e => {
            if (!isDragging) return;
            translateX = startTX + (e.clientX - startX);
            translateY = startTY + (e.clientY - startY);
            applyTransform();
        });

        document.addEventListener('mouseup', () => isDragging = false);

        container.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.max(0.2, Math.min(2, scale + delta));
            applyTransform();
        }, { passive: false });

        // 触摸支持
        let lastTouchDist = null;
        container.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                startTX = translateX;
                startTY = translateY;
            }
        });

        container.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                translateX = startTX + (e.touches[0].clientX - startX);
                translateY = startTY + (e.touches[0].clientY - startY);
                applyTransform();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                if (lastTouchDist) {
                    scale = Math.max(0.2, Math.min(2, scale * (dist / lastTouchDist)));
                    applyTransform();
                }
                lastTouchDist = dist;
            }
        }, { passive: false });

        container.addEventListener('touchend', () => {
            isDragging = false;
            lastTouchDist = null;
        });

        function zoomIn() { scale = Math.min(2, scale + 0.1); applyTransform(); }
        function zoomOut() { scale = Math.max(0.2, scale - 0.1); applyTransform(); }
        function resetView() { scale = 0.45; translateX = 0; translateY = 20; applyTransform(); }

        // 黑夜模式切换
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'true' : 'false');
            updateDarkModeIcon();
        }

        function updateDarkModeIcon() {
            const btn = document.querySelector('.dark-mode-toggle');
            if (btn) {
                btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            }
        }

        // 页面加载时恢复黑夜模式设置
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
        updateDarkModeIcon();
    </script>
</body>
