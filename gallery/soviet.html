            }

            }

        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #8b1a1a;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .filter-section {
            margin-bottom: 1rem;

            }

        .filter-label {
            font-weight: bold;
            color: #8b1a1a;
            margin-bottom: 0.5rem;
            display: block;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.4rem 1rem;
            border: 2px solid #e0e0e0;

            color: #666;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

            .filter-btn:hover {
                border-color: #8b1a1a;
                color: #8b1a1a;
            }

            .filter-btn.active {
                background: #8b1a1a;
                border-color: #8b1a1a;
                color: white;
            }

        .search-box {

            padding: 0.6rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;

                border-color: #8b1a1a;
            }

        .result-count {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.2rem;
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.25s;
            cursor: pointer;
        }

            .gallery-item:hover {
                transform: translateY(-4px);
                box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            }

        .gallery-item-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
            display: block;
            opacity: 0;
            transition: opacity 0.3s;
        }

            .gallery-item-image.loaded {
                opacity: 1;
            }

            .gallery-item-image.lazy-placeholder {
                background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite;
            }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .gallery-item-info {
            padding: 0.8rem 1rem;
        }

        .gallery-item-title {
            font-weight: bold;
            color: #333;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 0.4rem;
            display: -webkit-box;

            -webkit-box-orient: vertical;
            overflow: hidden;

            justify-content: space-between;
            font-size: 0.8rem;
            color: #888;
        }

            color: #8b1a1a;
            border-radius: 8px;
            font-weight: bold;

            }

            .load-more-btn:disabled {
                background: #ccc;
                cursor: default;
                transform: none;
            }

            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 1rem;

                display: flex;
            }

            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

            border-radius: 6px;
            display: block;
            opacity: 0;
            transition: opacity 0.3s;

            .modal-image.loaded {
                opacity: 1;
            }

            margin-top: 0.3rem;

        // 从文件名提取标题（去掉书名号和.jpg后缀）
        function parseTitle(filename) {
            let title = filename.replace(/^《/, '').replace(/》/, '');
            title = title.replace(/\.jpg$/i, '');
            return title;
        }

        // 构建完整数据
        const allData = RAW_DATA.map((item, idx) => ({
            idx: idx,
            cat: item.cat,
            title: parseTitle(item.filename),
            filename: item.filename,
            src: BASE + item.cat + '/' + encodeURIComponent(item.filename)
        }));

        // ============================================================
        //  状态管理
        // ============================================================
        let currentCat = 'all';
        let searchKw = '';
        let filteredData = [];
        let displayedCount = 0;
        const PAGE_SIZE = 24;
        let modalIndex = 0;
        let imageObserver = null;

        // 获取分类按钮HTML
        function getCatButtonsHTML() {
            let html = '<button class="filter-btn active" data-cat="all">全部（' + allData.length + '）</button>';
            for (const [catKey, catInfo] of Object.entries(CATEGORIES)) {
                html += `<button class="filter-btn" data-cat="${catKey}">${catInfo.icon} ${catInfo.label}（${catInfo.count}）</button>`;
            }
            return html;
        }

        // 筛选
        function applyFilter() {
            const kw = searchKw.toLowerCase();
            filteredData = allData.filter(item => {
                const matchCat = currentCat === 'all' || item.cat === currentCat;
                const matchKw = !kw || item.title.toLowerCase().includes(kw);
                return matchCat && matchKw;
            });
            displayedCount = 0;
            document.getElementById('galleryGrid').innerHTML = '';
            document.getElementById('resultCount').textContent = '共 ' + filteredData.length + ' 张';
            document.getElementById('statTotal').textContent = filteredData.length;
            initLazyLoader();
            loadMore();
        }

        function loadMore() {
            const grid = document.getElementById('galleryGrid');
            const end = Math.min(displayedCount + PAGE_SIZE, filteredData.length);
            for (let i = displayedCount; i < end; i++) {
                grid.appendChild(createCard(filteredData[i], i));
            }
            displayedCount = end;
            const btn = document.getElementById('loadMoreBtn');
            btn.disabled = displayedCount >= filteredData.length;
            btn.textContent = btn.disabled ? '已全部加载' : '加载更多（还剩 ' + (filteredData.length - displayedCount) + ' 张）';
        }

        function createCard(item, idx) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.onclick = () => openModal(idx);
            const catIcon = CATEGORIES[item.cat]?.icon || '📌';
            const catLabel = CATEGORIES[item.cat]?.label || item.cat;

            div.innerHTML =
                '<img class="gallery-item-image lazy-placeholder" data-src="' + item.src + '" alt="' + item.title.replace(/"/g, '&quot;') + '" onerror="this.classList.remove(\'lazy-placeholder\');this.style.background=\'#e8e8e8\';this.alt=\'图片加载失败\'">' +
                '<div class="gallery-item-info">' +
                '<div class="gallery-item-title">' + item.title + '</div>' +
                '<div class="gallery-item-meta">' +
                '<span class="gallery-item-cat">' + catIcon + ' ' + catLabel + '</span>' +
                '</div></div>';

            const img = div.querySelector('img');
            if (imageObserver) imageObserver.observe(img);
            return div;
        }

        function initLazyLoader() {
            if (imageObserver) imageObserver.disconnect();
            imageObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        const src = img.dataset.src;
                        if (src) {
                            const tmp = new Image();
                            tmp.onload = () => { img.src = src; img.classList.remove('lazy-placeholder'); img.classList.add('loaded'); };
                            tmp.onerror = () => { img.classList.remove('lazy-placeholder'); img.style.background = '#e8e8e8'; img.alt = '图片加载失败'; };
                            tmp.src = src;
                        }
                        imageObserver.unobserve(img);
                    }
                });
            }, { rootMargin: '100px 0px', threshold: 0.01 });
        }

        // 模态框
        function openModal(idx) {
            modalIndex = idx;
            renderModal();
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function renderModal() {
            const item = filteredData[modalIndex];
            const modalImg = document.getElementById('modalImage');
            modalImg.classList.remove('loaded');
            modalImg.classList.add('loading');
            modalImg.removeAttribute('src');
            const tmp = new Image();
            tmp.onload = () => { modalImg.src = item.src; modalImg.classList.remove('loading'); modalImg.classList.add('loaded'); };
            tmp.onerror = () => { modalImg.classList.remove('loading'); modalImg.alt = '图片加载失败'; };
            tmp.src = item.src;
            document.getElementById('modalTitle').textContent = item.title;
            const catIcon = CATEGORIES[item.cat]?.icon || '📌';
            const catLabel = CATEGORIES[item.cat]?.label || item.cat;
            document.getElementById('modalMeta').textContent = catIcon + ' ' + catLabel;
            document.getElementById('modalCounter').textContent = (modalIndex + 1) + ' / ' + filteredData.length;
        }

        function modalNav(dir) {
            const next = modalIndex + dir;
            if (next >= 0 && next < filteredData.length) {
                modalIndex = next;
                renderModal();
                if (modalIndex >= displayedCount - 3) loadMore();
            }
        }

        // 事件绑定
        function bindEvents() {
            document.querySelectorAll('[data-cat]').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCat = this.dataset.cat;
                    applyFilter();
                });
            });

            let searchTimer;
            document.getElementById('searchInput').addEventListener('input', function () {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => { searchKw = this.value.trim(); applyFilter(); }, 300);
            });

            document.getElementById('loadMoreBtn').addEventListener('click', () => loadMore());

            document.addEventListener('keydown', e => {
                if (!document.getElementById('imageModal').classList.contains('active')) return;
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') modalNav(-1);
                if (e.key === 'ArrowRight') modalNav(1);
            });

            document.getElementById('imageModal').addEventListener('click', function (e) {
                if (e.target === this) closeModal();
            });
        }

        // 黑夜模式
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'true' : 'false');
            const btn = document.querySelector('.dark-mode-toggle');
            if (btn) btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        // 初始化
        function init() {
            document.getElementById('catFilterButtons').innerHTML = getCatButtonsHTML();
            initLazyLoader();
            bindEvents();
            applyFilter();

            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                const btn = document.querySelector('.dark-mode-toggle');
                if (btn) btn.textContent = '☀️';
            }
        }

        init();
    </script>
</body>
</html>
