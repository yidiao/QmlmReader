    // 解析文件名 → { vol, src, thumbSrc, title, year, author }
    function parseFile(vol, filename) {
        const parts = filename.replace('.jpg','').split('_');
        const year = parts[1] || '年代不详';
        const title = parts[2] || filename;
        const author = parts[3] || '佚名';
        const subdir = vol === 'V01' ? 'V01-第一辑' : vol === 'V02' ? 'V02-第二辑' : 'V03-第三辑';
        const fullSrc = BASE + subdir + '/' + filename;
        return {
            vol,
            src: fullSrc,           // 原图路径
            thumbSrc: fullSrc,      // 缩略图路径（目前复用原图，后续可改为独立缩略图目录）
            title,
            year,
            author,
            filename
        };
    }

        "505_1982_鱼庆欢喜（杨柳青年画传统）_佚名.jpg","506_1983_共产主义一定要实现（纪念卡尔·马克思逝世一百周年）_杨克山.jpg","507_1983_爱社会主义_哈琼文.jpg","508_1986_斯大林_人民美术出版社.jpg","509_1986_恩格斯_人民美术出版社.jpg",
        "510_1986_列宁_人民美术出版社.jpg","511_1986_马克思_人民美术出版社.jpg","512_1986_毛泽东主席_人民美术出版社.jpg","513_1988_生肖动物_佚名.jpg"
    ];

    const FILES_V03 = ["001_1964_登山英雄连环挂图_庞亦鹏程绘.jpg","002_1961_我们敬爱的毛主席_王伟戌绘.jpg","003_1964_把新殖民主义者赶出非洲去_王大同、杜詠樵.jpg","004_1964_全民皆兵保卫祖国_翁逸之.jpg","005_1964_学习雷锋好榜样 做永不生锈的螺丝钉_张碧梧绘.jpg","006_年代不详_瑞草延年_佚名.jpg","007_1964_雷锋_李慕白、金雪尘绘.jpg","008_1965_不忘阶级仇永做革命人_陈谋、董舒.jpg","009_1980_繁花似锦 欣欣向荣_赵胜利、关愈.jpg","010_1964_毛主席著作像太阳_范璞、唐德泉.jpg","011_1964_读毛主席书 听毛主席话_庞卡绘.jpg","012_1960_在毛泽东思想光辉照耀下胜利前进_翁逸之绘.jpg","013_1964_雷锋和少年儿童在一起_张峻摄.jpg","014_1965_美帝国主义从多米尼亚加滚出去_曹振峰.jpg","015_1964_经常读报 关心时事_杨玉华.jpg","016_1965_革命的女战士 生产的红旗手_刘秉礼.jpg","017_1955_白求恩医生_丽塔·普里萨曼.jpg","018_1969_黄巢入长安_程十发绘.jpg","019_1980_喜庆丰收_黄妙发.jpg","020_1961_农业十我的志愿 立志做个新型的农民_严幼俊、程自良、张怀江.jpg","021_1964_人民子弟兵_吴哲夫.jpg","022_1964_人人争当五好社员_权正环.jpg","023_1964_年年逢春年年乐 今春人更乐_李树勤.jpg","024_1961_主席走遍全国_李琦.jpg","025_年代不详_故事会_李姣.jpg","026_1964_志在农村_那启明.jpg","027_1964_不爱红装爱武装_佚名.jpg","028_1963_我们也开拖拉机_廉浦.jpg","029_1980_哪吒闹海_史士明.jpg","030_1962_给毛主席拜年_沙更世.jpg","031_1964_列宁_钱大昕.jpg","032_1973_老书记_佚名.jpg","033_1980_渔童_柳忠福.jpg","034_1964_给女民兵示范_张兆柏.jpg","035_1964_知识青年到农村是光荣的革命行动_姜维常.jpg","036_1964_灯庆丰年_高潮.jpg","037_年代不详_大棉花_佚名.jpg","038_年代不详_新年年画_佚名.jpg","039_1964_新中国的少年儿童_沈家琳等.jpg","040_1964_祖国万岁_哈琼文.jpg","041_年代不详_养得好_刘泽文.jpg","042_1965_把美国侵略者从越南南方赶出去_孙世涛.jpg","043_1958_大豆过江_朱会然、华君武.jpg","044_年代不详_永远保持同群众一起劳动的革命传统_张汝济.jpg","045_1964_山村秋景_董其中.jpg","046_1981_万象更新喜迎春_杨馥如、徐飞鸿.jpg"];

    // 组合全部数据
    const allData = [
        ...FILES_V01.map(f => parseFile('V01', f)),
        ...FILES_V02.map(f => parseFile('V02', f)),
        ...FILES_V03.map(f => parseFile('V03', f))
    ];

    // ============================================================
    //  状态
    // ============================================================
    let currentVol = 'all';
    let searchKw = '';
    let filteredData = [];
    let displayedCount = 0;
    const PAGE_SIZE = 24;
    let modalIndex = 0;  // index in filteredData
    let imageObserver = null;  // IntersectionObserver for lazy loading

    // ============================================================
    //  筛选 & 渲染
    // ============================================================
    function applyFilter() {
        const kw = searchKw.toLowerCase();
        filteredData = allData.filter(item => {
            const matchVol = currentVol === 'all' || item.vol === currentVol;
            const matchKw = !kw || item.title.includes(kw) || item.author.toLowerCase().includes(kw);
            return matchVol && matchKw;
        });
        displayedCount = 0;
        document.getElementById('galleryGrid').innerHTML = '';
        document.getElementById('resultCount').textContent = '共 ' + filteredData.length + ' 张';
        // 重新初始化懒加载观察器
        initLazyLoader();
        loadMore();
    }

    function loadMore() {
        const grid = document.getElementById('galleryGrid');
        const end = Math.min(displayedCount + PAGE_SIZE, filteredData.length);
        for (let i = displayedCount; i < end; i++) {
            grid.appendChild(createCard(filteredData[i], i));
        }
        displayedCount = end;
        const btn = document.getElementById('loadMoreBtn');
        btn.disabled = displayedCount >= filteredData.length;
        btn.textContent = btn.disabled ? '已全部加载' : '加载更多（还剩 ' + (filteredData.length - displayedCount) + ' 张）';
    }

        function createCard(item, idx) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.onclick = () => openModal(idx);
            const volLabel = { V01: '第一辑', V02: '第二辑', V03: '第三辑' }[item.vol];

            // 使用 data-src 实现懒加载
            div.innerHTML =
                '<img class="gallery-item-image lazy-placeholder" data-src="' + item.thumbSrc + '" alt="' + item.title.replace(/"/g, '&quot;') + '" onerror="this.classList.remove(\'lazy-placeholder\');this.style.background=\'#e8e8e8\';this.alt=\'图片加载失败\'">' +
                '<div class="gallery-item-info">' +
                '<div class="gallery-item-title">' + item.title + '</div>' +
                '<div class="gallery-item-meta">' +
                '<span class="gallery-item-vol">' + volLabel + '</span>' +
                '<span>' + item.year + (item.author !== '佚名' ? ' · ' + item.author : '') + '</span>' +
                '</div></div>';

            const img = div.querySelector('img');
            if (imageObserver) {
                imageObserver.observe(img);
            }
            return div;
        }

    // 初始化 IntersectionObserver 实现懒加载
    function initLazyLoader() {
        if (imageObserver) {
            imageObserver.disconnect();
        }
        
        imageObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const src = img.dataset.src;
                    if (src) {
                        // 开始加载图片
                        const tempImg = new Image();
                        tempImg.onload = () => {
                            img.src = src;
                            img.classList.remove('lazy-placeholder');
                            img.classList.add('loaded');
                        };
                        tempImg.onerror = () => {
                            img.classList.remove('lazy-placeholder');
                            img.style.background = '#e8e8e8';
                            img.alt = '图片加载失败';
                        };
                        tempImg.src = src;
                    }
                    // 加载后停止观察
                    imageObserver.unobserve(img);
                }
            });
        }, {
            rootMargin: '100px 0px',  // 提前 100px 开始加载
            threshold: 0.01
        });
    }

    // ============================================================
    //  模态框（index 始终基于 filteredData）
    // ============================================================
    function openModal(idx) {
        modalIndex = idx;
        renderModal();
        document.getElementById('imageModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('imageModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    function renderModal() {
        const item = filteredData[modalIndex];
        const modalImg = document.getElementById('modalImage');
        
        // 显示加载状态
        modalImg.classList.remove('loaded');
        modalImg.classList.add('loading');
        modalImg.removeAttribute('src');
        
        // 加载原图
        const tempImg = new Image();
        tempImg.onload = () => {
            modalImg.src = item.src;
            modalImg.classList.remove('loading');
            modalImg.classList.add('loaded');
        };
        tempImg.onerror = () => {
            modalImg.classList.remove('loading');
            modalImg.alt = '图片加载失败';
        };
        tempImg.src = item.src;
        
        document.getElementById('modalTitle').textContent = item.title;
        document.getElementById('modalMeta').textContent =
            ({V01:'第一辑', V02:'第二辑', V03:'第三辑'}[item.vol]) +
            ' · ' + item.year +
            (item.author !== '佚名' ? ' · ' + item.author : '');
        document.getElementById('modalCounter').textContent =
            (modalIndex + 1) + ' / ' + filteredData.length;
    }

    function modalNav(dir) {
        const next = modalIndex + dir;
        if (next >= 0 && next < filteredData.length) {
            modalIndex = next;
            renderModal();
            // 若翻到了还没渲染的区域，先加载
            if (modalIndex >= displayedCount - 3) loadMore();
        }
    }

    // 键盘
    document.addEventListener('keydown', e => {
        if (!document.getElementById('imageModal').classList.contains('active')) return;
        if (e.key === 'Escape') closeModal();
        if (e.key === 'ArrowLeft') modalNav(-1);
        if (e.key === 'ArrowRight') modalNav(1);
    });
    // 点背景关闭
    document.getElementById('imageModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ============================================================
    //  事件绑定
    // ============================================================
    document.querySelectorAll('[data-vol]').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('[data-vol]').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentVol = this.dataset.vol;
            applyFilter();
        });
    });

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            searchKw = this.value.trim();
            applyFilter();
        }, 300);
    });

    // 黑夜模式
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'true' : 'false');
        document.querySelector('.dark-mode-toggle').textContent =
            document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        const btn = document.querySelector('.dark-mode-toggle');
        if (btn) btn.textContent = '☀️';
    }

    // 初始化
    initLazyLoader();
    applyFilter();
    </script>
</body>
</html>
